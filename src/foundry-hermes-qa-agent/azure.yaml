# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: foundry-hermes-qa-agent
services:
    foundry-hermes-qa-agent:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            path: Dockerfile
            context: .
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
        startupCommand: python -m foundry_hermes_qa_agent
